name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npx vsce package --out codegraph-viewer-${{ github.ref_name }}.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: codegraph-viewer-${{ matrix.os }}
          path: "*.vsix"

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Compile
        run: npm run compile

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --no-update-package-json ${{ steps.version.outputs.VERSION }}

      - name: Package VSIX
        run: npx vsce package --out codegraph-viewer-${{ github.ref_name }}.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: codegraph-viewer-release
          path: "*.vsix"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: codegraph-viewer-${{ github.ref_name }}.vsix
          generate_release_notes: true
